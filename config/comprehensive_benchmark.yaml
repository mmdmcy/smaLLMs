# Comprehensive Benchmarking Configuration
# Optimized for slow laptops with extensive timeouts

evaluation:
  num_samples: 50  # Reduced for faster evaluation
  batch_size: 1    # Sequential processing for slow hardware
  max_concurrent_requests: 1
  batch_delay: 5.0  # Longer delay between requests
  
  # Checkpoint settings for long runs
  checkpoint_interval: 5
  save_partial_results: true

# Ollama settings optimized for slow laptops
ollama:
  base_url: "http://localhost:11434"
  disable_thinking: true  # Keeps short benchmarks answer-focused; set false for thinking experiments
  gpt_oss_think_level: "low"  # GPT-OSS supports levels instead of boolean off
  thinking_min_tokens: 128  # Minimum response budget when a thinking level is required
  timeout: 900  # 15 minutes base timeout
  max_retries: 5
  batch_delay: 10.0  # 10 second delay between requests
  
# LM Studio settings
lm_studio:
  base_url: "http://localhost:1234"
  timeout: 600
  max_retries: 3

# Benchmark suite preferences
benchmark_suites:
  default: "core_suite"  # Balanced default
  comprehensive: "serious_suite"  # Broad local evaluation
  quick_test: "quick_suite"  # Fast verification
  industry_standard:
    - "frontier_report_suite"
    - "knowledge_suite"
    - "commonsense_suite"

# Logging configuration
logging:
  level: "INFO"
  save_samples: true
  detailed_errors: true
